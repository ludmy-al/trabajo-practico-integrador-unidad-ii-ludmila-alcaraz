<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="contactos.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <title>IPF pagina</title>
  </head>
  <body>
    <header class="main-header">
      <div class="logo">
        <h1>IPF</h1>
      </div>
      <nav class="nav-menu">
        <ul>
          <li><a href="index.html">Inicio</a></li>
          <li><a href="institucional.html">Institucional</a></li>
          <li><a href="carreras.html">Carreras</a></li>
          <li><a href="contactos.html">Contactos</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <!--Formulario de consulta desarrollado con Bootstrap-->
      <form class="row g-3">
        <div class="col-md-6">
          <label for="inputEmail4" class="form-label">Email</label>
          <input type="email" class="form-control" id="inputEmail4" />
        </div>
        <div class="col-md-6">
          <label for="inputPassword4" class="form-label">Telefono</label>
          <input type="text" class="form-control" id="inputText" />
        </div>
        <div class="col-12">
          <label for="inputAddress" class="form-label">Dirección</label>
          <input
            type="text"
            class="form-control"
            id="inputAddress"
            placeholder="1234 Main St"
          />
        </div>
        <div class="col-md-6">
          <label for="inputCity" class="form-label">Ciudad</label>
          <input type="text" class="form-control" id="inputCity" />
        </div>
        <div class="col-md-4">
          <label for="inputState" class="form-label">Departamento</label>
          <select id="inputState" class="form-select">
            <option selected>Seleccionar...</option>
            <option>Ramón Lista</option>
            <option>Matacos</option>
            <option>Bermejo</option>
            <option>Patiño</option>
            <option>Pilagá</option>
            <option>Pirane</option>
            <option>Pilcomayo</option>
            <option>Formosa</option>
            <option>Laishi</option>
          </select>
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary">Sign in</button>
        </div>
      </form>

      <h2>Dato de Contacto</h2>
      <p>Dirección: Ruta Nac. 81 km. 1190 | Formosa.</p>
      <p>Email: info@ipf.edu.ar</p>
      <p>WhatsApp: 3704860530</p>
      <div id="section-figure">
        <figure>
          <img src="img/ubicación.png" alt="UBICACIÓN DEL IPF" />
        </figure>
        <figcaption>UBICACIÓN DEL IPF</figcaption>
      </div>
      <h2>Horarios de atención</h2>
      <p>Lunes a Viernes 09:00-16:50</p>
    </main>

    <footer>
      <p>&copy; IPF Todos los derechos recervados</p>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
